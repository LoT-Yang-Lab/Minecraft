  <style>

    }
    .nc-test-v3 .nc-nav-line--goal .nc-nav-line-txt {
      display: inline-flex !important;

    .nc-test-v3 .nc-goal-legend-wrap {

    .nc-test-v3 .nc-v3-goal-img {

    .nc-test-v3 .nc-map-rec--v3 .nc-map-rec-actions {

    .nc-test-v3 .nc-map-rec--v3 .nc-map-rec-palette-item {

    .nc-test-v3 #nc-pot-wrap-1 > div,
    .nc-test-v3 #nc-pot-wrap-2 > div,

    .nc-test-v3 #nc-pot-wrap-1 > div::after,
    .nc-test-v3 #nc-pot-wrap-2 > div::after,

    }
    .nc-test-v3 #nc-pot-wrap-1 > div::after { content: "魔法药水1"; }
    .nc-test-v3 #nc-pot-wrap-2 > div::after { content: "魔法药水2"; }
    .nc-test-v3 #nc-pot-wrap-3 > div::after { content: "魔法药水3"; }
    /* 测试页：全局跳过 */
    .nc-test-banner {
      position: fixed; left: 0; right: 0; top: 0; z-index: 99998;
      padding: 8px 120px 8px 14px; font-size: 13px; text-align: center;
      background: rgba(120, 40, 40, 0.92); color: #ffe8e8; border-bottom: 1px solid #a05050;

<script src="materials/nav_bundle.js"></script>
<script>
(function () {
  if (window.NC_NAV_GRAPH) {
    window.NC_MIX_NAV_EMBED = {
      graph: window.NC_NAV_GRAPH,
      trialSequence: { trials: [] },
    };
  }
})();
</script>
<script src="materials/nav_embed.js"></script>
<script src="materials/mix_embed.js"></script>
<script src="js/asset_resolve.js"></script>
<script src="js/config.js"></script>
<script src="js/grid_geometry.js"></script>
<script src="js/nav_runner.js"></script>
<script src="js/crafting_runner.js"></script>
<script src="js/tail_task_embed_v3.js"></script>
<script src="js/adaptive_tail_task_embed_v3.js"></script>
<script>
(function () {
  /** 指导示意图等与单机范式相同，置于本目录 materials/ 下 */
  var MAT = "materials/";

  if (!window.NC_MIX_MIX_EMBED || !window.NC_MIX_MIX_EMBED.orders) {
    document.body.innerHTML =
      "<div style='padding:24px;'>缺少 <code>materials/mix_embed.js</code>。在本范式所在仓库运行 <code>python scripts/export_mix_web.py</code>（需能导入 <code>NC_MIX_TASK</code> 下 crafting）生成后，将生成的文件放入本目录 <code>materials/</code>。</div>";
    return;
  }
  if (!window.NC_MIX_NAV_EMBED || !window.NC_MIX_NAV_EMBED.graph) {
    document.body.innerHTML =
      "<div style='padding:24px;'>缺少导航图数据。请确认本目录 <code>materials/nav_bundle.js</code> 与 <code>materials/nav_embed.js</code> 存在（可与 navigation_jspsych 导出一致）。</div>";
    return;
  }
  if (
    typeof initJsPsych !== "function" ||
    typeof jsPsychHtmlKeyboardResponse === "undefined" ||
    typeof jsPsychCallFunction === "undefined" ||
    typeof NCNavRunner === "undefined" ||
    typeof NCCraftingRunner === "undefined" ||
    typeof window.NCTailTaskEmbedV3 === "undefined" ||
    typeof window.NCAdaptiveTailTaskV3 === "undefined"
  ) {
    document.body.innerHTML =
      "<div style='padding:24px;line-height:1.6;max-width:560px;'>缺少依赖：请确认 <code>dist/</code>、<code>js/nav_runner.js</code>、<code>js/crafting_runner.js</code>、<code>js/tail_task_embed_v3.js</code>、<code>js/adaptive_tail_task_embed_v3.js</code> 与本页同级。</div>";
    return;
  }

  var isFile = window.location.protocol === "file:";
  var extensions =
    !isFile && typeof Naodao !== "undefined" ? [{ type: Naodao }] : [];

  var rules = window.NC_MIX_MIX_EMBED.craftingRules;
  var graph = window.NC_MIX_NAV_EMBED.graph;

  var jsPsych = initJsPsych({
    override_safe_mode: true,
    extensions: extensions,
    on_trial_start: function () {
      ncTestEnsureSkipChrome();
    },
    on_finish: function () {
      ncTestTeardownSkipChrome();
      var rows = JSON.stringify(jsPsych.data.get().values(), null, 2);
      var blob = new Blob([rows], { type: "application/json;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "mix_nc_jspsych_test_v3_" + Date.now() + ".json";
      a.click();
      URL.revokeObjectURL(url);
      var el = document.getElementById("jspsych-content");
      if (el) {
        el.innerHTML =
          "<div style='padding:40px;text-align:center;font-size:20px;'>数据已尝试下载。请关闭本页。</div>";
      }
    },
  });
  window.jsPsych = jsPsych;

  /** 测试页：任意试次按 Esc 或点浮动按钮立即结束当前试次（写入 test_mode_skip） */
  window.__ncMixActiveIntroHandler = null;
  (function patchFinishTrialForIntroCleanup() {
    var orig = jsPsych.finishTrial.bind(jsPsych);
    jsPsych.finishTrial = function (data) {
      if (window.__ncMixActiveIntroHandler) {
        try {
          window.removeEventListener("keydown", window.__ncMixActiveIntroHandler, true);
        } catch (e1) {}
        window.__ncMixActiveIntroHandler = null;
      }
      return orig(data || {});
    };
  })();

  var __ncTestSkipBound = false;
  var __ncTestSkipFab = null;
  var __ncTestBanner = null;
  function ncTestEnsureSkipChrome() {
    if (!__ncTestBanner) {
      __ncTestBanner = document.createElement("div");
      __ncTestBanner.className = "nc-test-banner";
      __ncTestBanner.textContent =
        "测试 index_test_v3（主观表征版）：右上角「跳过」或 Esc 结束当前试次（数据会带 test_mode_skip，勿用于正式采集）";
      document.body.appendChild(__ncTestBanner);
    }
    if (!__ncTestSkipFab) {
      __ncTestSkipFab = document.createElement("button");
      __ncTestSkipFab.type = "button";
      __ncTestSkipFab.className = "nc-test-skip-fab";
      __ncTestSkipFab.textContent = "跳过当前试次 (Esc)";
      __ncTestSkipFab.setAttribute("aria-label", "跳过当前试次");
      __ncTestSkipFab.onclick = function (ev) {
        ev.preventDefault();
        ev.stopPropagation();
        ncTestSkipCurrentTrial("button");
      };
      document.body.appendChild(__ncTestSkipFab);
    }
    if (!__ncTestSkipBound) {
      __ncTestSkipBound = true;

  function loadImage(url) {
    return new Promise(function (resolve) {
      var img = new Image();
      img.onload = function () {
        if (typeof img.decode === "function") {
          img.decode().then(
            function () {
              resolve(true);
            },
            function () {
              resolve(true);
            }
          );
          return;
        }
        resolve(true);
      };
      img.onerror = function () {
        resolve(false);
      };
      img.src = url;
    });
  }
  function normalizeStoneId(sid) {
    var m = /^stone_(\d+)$/i.exec(String(sid || ""));
    if (!m) return String(sid || "");
    return "stone_" + String(parseInt(m[1], 10)).padStart(2, "0");
  }
  function collectStoneIds(rulesObj, trialRows) {
    var seen = {};
    function addSid(sid) {
      var n = normalizeStoneId(sid);
      if (!n || seen[n]) return;
      seen[n] = true;
    }
    for (var i = 1; i <= 9; i++) {
      addSid("stone_" + String(i).padStart(2, "0"));
    }
    (trialRows || []).forEach(function (row) {
      if (!row) return;
      addSid(row.start_state);
      var tg = row.order_targets || [];
      tg.forEach(addSid);
    });
    var maps = [];
    if (rulesObj && typeof rulesObj === "object") {
      maps = [
        rulesObj.potion1,
        rulesObj.potion1_rev,
        rulesObj.potion2,
        rulesObj.potion2_rev,
        rulesObj.potion3,
      ];
    }
    maps.forEach(function (mp) {
      if (!mp || typeof mp !== "object") return;
      Object.keys(mp).forEach(function (k) {
        addSid(k);
        addSid(mp[k]);
      });
    });
    return Object.keys(seen);
  }
  async function resolveFirstWorkingUrl(cands) {
    if (!Array.isArray(cands) || !cands.length) return "";
    for (var i = 0; i < cands.length; i++) {
      var ok = await loadImage(cands[i]);
      if (ok) return cands[i];

  async function preloadCraftingAssets(stoneIds) {
    var cache = { stone: {}, bottle: {}, nav: {} };
    var hasAssets =
      window.NCMixAssets &&
      typeof window.NCMixAssets.stoneUrlCandidates === "function" &&
      typeof window.NCMixAssets.bottleUrlCandidates === "function" &&
      typeof window.NCMixAssets.navStationCandidates === "function";
    if (!hasAssets) return cache;

    stoneIds = Array.isArray(stoneIds) && stoneIds.length ? stoneIds : collectStoneIds(rules, []);

    var total = stoneIds.length + 3 + 4 + 9;
    var doneCount = 0;
    function bump(msg) {
      doneCount += 1;
      updatePreloadOverlay("已完成 " + doneCount + " / " + total + " · " + msg);
    }

    await loadImage(MAT + "intro_navigation1.png");
    bump("导航练习图");
    await loadImage(MAT + "intro_navigation2.png");
    bump("导航正式示意图");
    await loadImage(MAT + "intro_crafting.png");
    bump("合成练习图");
    await loadImage(MAT + "intro_crafting2.png");

    for (var si = 0; si < stoneIds.length; si++) {

      cache.stone[sid] = sUrl || "";

      cache.bottle[String(bi)] = bUrl || "";

    for (var ni = 1; ni <= 9; ni++) {
      var nvUrl = await resolveFirstWorkingUrl(window.NCMixAssets.navStationCandidates(ni));

      bump("站点图 " + ni);

    return cache;
  }

        if (row.task_id != null) staticData.task_id = String(row.task_id);
        else if (row.trial_id != null) staticData.task_id = String(row.trial_id);

        staticData.trial_id =

            ? String(row.trial_id)

        staticData.goal_code = parseInt(row.targetB, 10);

  function appendTransitionRestPhase(timeline, context, nextStageLabel, orderKey) {
    timeline.push({
      type: jsPsychCallFunction,
      async: true,
      data: {
        screen_id: "transition_rest_" + context,
        phase: "transition_rest",
        rest_context: context,
        experiment_order: orderKey,
      },
      func: function (done) {
        var root = jsPsych.getDisplayElement();
        var minMs = 5000;
        var t0 = performance.now();
        var finished = false;
        function render() {
          if (finished) return;
          var elapsed = performance.now() - t0;
          var remaining = Math.max(0, minMs - elapsed);
          var hint =
            remaining > 0
              ? Math.ceil(remaining / 1000) + " 秒后可继续。"
              : "准备好后，请按空格继续。";
          root.innerHTML =
            "<div class='nc-inst' style='max-width:620px;text-align:left;'>" +
            "<h2>请稍作休息</h2>" +
            "<p>本阶段已完成。请稍作休息，准备进入" +
            nextStageLabel +
            "。</p>" +
            "<p class='nc-inst-hint'>" +
            hint +
            "</p></div>";
          window.requestAnimationFrame(render);
        }
        function finish(interrupted) {
          if (finished) return;
          finished = true;
          window.removeEventListener("keydown", onKey, true);
          done({
            phase: "transition_rest",
            rest_context: context,
            rest_min_duration_ms: minMs,
            rest_actual_duration_ms: Math.round(performance.now() - t0),
            next_stage_label: nextStageLabel,
            interrupted: !!interrupted,
          });
        }
        function onKey(ev) {
          if ((ev.key === " " || ev.code === "Space" || ev.key === "Enter") && performance.now() - t0 >= minMs) {
            ev.preventDefault();
            finish(false);
          }
        }
        window.addEventListener("keydown", onKey, true);
        render();
      },
    });
  }

          experiment_order: ord,
        });
        resolve({ participant_id: pid, experiment_order: ord });
      };
    });
  }

  async function run() {
    showPreloadOverlay("正在加载示意图与素材…");
    await loadImage(MAT + "intro_navigation1.png");
    await loadImage(MAT + "intro_navigation2.png");
    await loadImage(MAT + "intro_crafting.png");
    await loadImage(MAT + "intro_crafting2.png");

    updatePreloadOverlay("请填写被试信息…");
    var reg = await collectParticipantAndOrder();
    var orderKey = reg.experiment_order;
    var pack = window.NC_MIX_MIX_EMBED.orders[orderKey];
    if (!pack || !pack.sessions) {
      document.getElementById("jspsych-content").innerHTML =
        "<div style='padding:24px;'>所选顺序无数据: " + orderKey + "</div>";
      return;
    }

    var craftRows = collectAllCraftRowsForOrder(pack);
    var allStoneIds = collectStoneIds(rules, craftRows);
    updatePreloadOverlay("正在解析并缓存石块图与药水图片...");
    var cache = await preloadCraftingAssets(allStoneIds);
    window.NC_MIX_ASSET_PREFETCH = cache;

    var timeline = [];

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus:
        "<div class='nc-inst'>" +
        "<h2>正式测试（3 个 Session）</h2>" +
        "<p>本版本共 <strong>3</strong> 个正式 Session：<strong>前两个</strong>为纯导航或纯合成块（取决于您选择的顺序）。</p>" +
        "<p><strong>每个单任务 Session 的正式试次前</strong>，会先进行与<strong>该任务</strong>对应的自由探索练习；<strong>Session 3 为混合试次</strong>（导航与合成交替，不再单独加练习块）。</p>" +
        "<p>完成<strong>纯导航</strong>或<strong>纯合成</strong> Session 后，将各进行一段<strong>固定 B/D/E 答题</strong>，随后有短暂休息；<strong>Session 3 结束后</strong>将根据正式任务表现生成一段<strong>adaptive B/D/E 答题</strong>。</p>" +
        "<p>各 Session 开始前有简要说明；试次进度在界面顶部显示。</p>" +
        "<p class='nc-inst-hint'>按 <strong>空格</strong> 开始（接下来将进入 Session 1 前的相关阶段）。</p>" +
        "<p style='font-size:13px;color:#c9a0a0;margin-top:14px'>本页为 <strong>index_test_v3</strong>：固定 B/D/E 与 adaptive B/D/E 均为主观表征版、无自信评分；全程可用右上角「跳过」或 <strong>Esc</strong>（数据含 test_mode_skip、tail_present_version v3、adaptive_tail_task_version v3）。</p></div>",
      choices: [" "],
      data: { screen_id: "mix_pre_main_intro" },
    });

    var sessions = pack.sessions || [];
    var finalSessionNumber = sessions.reduce(function (m, sess) {
      return Math.max(m, Number(sess.session || 0));
    }, 0);

    sessions.forEach(function (sess) {
      if (sess.domain === "navigation") {
        appendNavExplorationPractice(timeline);
      } else if (sess.domain === "crafting") {
        appendCraftExplorationPractice(timeline);
      }
      appendSessionBlock(timeline, sess, orderKey);
      if (sess.domain === "navigation") {
        window.NCTailTaskEmbedV3.appendTailPhaseToTimeline(timeline, "navigation", reg.participant_id, orderKey);
        if (Number(sess.session || 0) < finalSessionNumber) {
          appendTransitionRestPhase(timeline, "after_tail_session_" + sess.session, "Session " + (Number(sess.session) + 1), orderKey);
        }
      } else if (sess.domain === "crafting") {
        window.NCTailTaskEmbedV3.appendTailPhaseToTimeline(timeline, "crafting", reg.participant_id, orderKey);
        if (Number(sess.session || 0) < finalSessionNumber) {
          appendTransitionRestPhase(timeline, "after_tail_session_" + sess.session, "Session " + (Number(sess.session) + 1), orderKey);
        }
      }
    });

    window.NCAdaptiveTailTaskV3.appendAdaptiveTailPhaseToTimeline(timeline, reg.participant_id, orderKey);

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus:
        "<div class='nc-inst' style='text-align:center;max-width:560px;'>" +
        "<h2>实验结束</h2>" +
        "<p>全部 Session、固定 B/D/E 与 <strong>adaptive B/D/E</strong> 已完成。浏览器将尝试下载数据文件。</p>" +
        "<p class='nc-inst-hint'>按 <strong>空格</strong> 结束并触发下载。</p></div>",
      choices: [" "],
      data: { screen_id: "mix_finish" },
    });

    jsPsych.run(timeline);
  }

  run();
})();
</script>
</html>
